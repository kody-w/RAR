name: Template Setup

on:
  create:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  configure-instance:
    runs-on: ubuntu-latest
    # Only run on template instances, not the main RAR repo
    if: github.repository != 'kody-w/RAR'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure as RAR instance
        run: python scripts/setup_instance.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Rebuild registry with instance metadata
        run: python build_registry.py

      - name: Commit configuration
        run: |
          git config user.name "RAR Setup Bot"
          git config user.email "rar-bot@users.noreply.github.com"
          git add rar.config.json registry.json
          git diff --cached --quiet || git commit -m "Configure as RAR instance [skip ci]"
          git push
