name: Process Community Issues

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to reprocess'
        required: false

permissions:
  contents: write
  issues: write

concurrency:
  group: state-writer
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    # Only process issues with the RAR action prefix in title
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.issue.title, '[RAR]')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process issue
        id: process
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python scripts/process_issues.py --event-path "$GITHUB_EVENT_PATH" 2>&1 | tee /tmp/result.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Rebuild registry (if agent submitted)
        if: steps.process.outputs.exit_code == '0'
        run: |
          if git diff --name-only | grep -q "^agents/"; then
            python build_registry.py
          fi

      - name: Commit state changes
        if: always()
        run: |
          git config user.name "RAPP Registry Bot"
          git config user.email "rapp-bot@users.noreply.github.com"
          git add state/ registry.json agents/ || true
          if ! git diff --cached --quiet; then
            git pull --rebase origin main || true
            git commit -m "Process issue #${{ github.event.issue.number }} [skip ci]"
            for i in 1 2 3 4 5; do
              git push && break
              echo "Push attempt $i failed, rebasing..."
              git pull --rebase origin main
            done
          fi

      - name: Comment on issue (success)
        if: steps.process.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue?.number || ${{ github.event.inputs.issue_number || 0 }};
            if (issueNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '✅ Processed successfully! State updated.'
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed',
                labels: ['processed']
              });
            }

      - name: Comment on issue (failure)
        if: steps.process.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue?.number || ${{ github.event.inputs.issue_number || 0 }};
            if (issueNumber) {
              const fs = require('fs');
              let detail = '';
              try { detail = fs.readFileSync('/tmp/result.txt', 'utf8'); } catch(e) {}
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `❌ Processing failed.\n\n\`\`\`\n${detail.slice(0, 500)}\n\`\`\``
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed',
                labels: ['failed']
              });
            }
