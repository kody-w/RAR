name: Approve Agent Submission

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

concurrency:
  group: state-writer
  cancel-in-progress: false

jobs:
  approve:
    runs-on: ubuntu-latest
    # Only fires when admin adds 'approved' label to an open pending submission
    if: >
      github.event.label.name == 'approved' &&
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'agent-submission')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Promote staging → agents
        id: promote
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          python -c "
          import ast, json, re, shutil, sys, hashlib, os
          from pathlib import Path

          staging = Path('staging')
          agents = Path('agents')

          # Extract agent name from issue title: [AGENT] @publisher/slug
          title = os.environ.get('ISSUE_TITLE', '')
          m = re.search(r'\[AGENT\]\s*(@[^/\s]+/[^\s]+)', title)
          target_slug = None
          if m:
              raw = m.group(1)
              parts = raw.split('/')
              publisher = parts[0]
              slug = parts[1]
              if not slug.endswith('_agent'):
                  slug += '_agent'
              target_slug = f'{publisher}/{slug}.py'
              print(f'Scoped promotion: only {target_slug}')

          promoted = []

          for py in staging.rglob('*.py'):
              if py.name == '.gitkeep':
                  continue
              rel = py.relative_to(staging)
              # Only promote the specific file tied to this issue
              if target_slug and str(rel) != target_slug:
                  print(f'Skipping {rel} (not target)')
                  continue
              dest = agents / rel
              dest.parent.mkdir(parents=True, exist_ok=True)
              shutil.move(str(py), str(dest))
              promoted.append(str(rel))
              print(f'Promoted: {rel}')

          # Clean empty staging dirs
          for d in sorted(staging.rglob('*'), reverse=True):
              if d.is_dir() and not any(d.iterdir()):
                  d.rmdir()

          if not promoted:
              print('Nothing to promote')
              sys.exit(0)

          # Write list for downstream steps
          Path('/tmp/promoted.txt').write_text('\n'.join(promoted))
          print(f'Total promoted: {len(promoted)}')
          "

      - name: Forge cards for approved agents
        run: |
          if [ -f /tmp/promoted.txt ]; then
            python scripts/generate_holo_cards.py
          fi

      - name: Build registry
        run: python build_registry.py

      - name: Commit approved agents
        run: |
          git config user.name "RAPP Registry Bot"
          git config user.email "rapp-bot@users.noreply.github.com"
          git add agents/ staging/ registry.json cards/ || true
          if ! git diff --cached --quiet; then
            git commit -m "Approved agent submission from #${{ github.event.issue.number }} [skip ci]"
            for i in 1 2 3 4 5; do
              git push && break
              echo "Push attempt $i failed, rebasing..."
              git pull --rebase origin main || git rebase --abort
              # Re-stage and re-commit if rebase had conflicts
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                git rebase --abort
                git pull origin main --no-rebase
                git add agents/ staging/ registry.json cards/ || true
                git diff --cached --quiet || git commit -m "Approved agent submission from #${{ github.event.issue.number }} (retry) [skip ci]"
              fi
            done
          fi

      - name: Close issue as approved
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: '✅ **Approved and forged.** Agent promoted to the registry. Card details determined by the forge based on the agent code.\n\nWelcome to RAPP.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              labels: ['approved', 'forged']
            });
