name: Build Agent Registry

on:
  push:
    paths:
      - 'agents/**/*.py'
      - 'build_registry.py'
      - 'rar.config.json'
      - '.github/workflows/build-registry.yml'
  pull_request:
    paths:
      - 'agents/**/*.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Reject kebab-case agent filenames
        run: |
          BAD=$(find agents -name '*-*' -name '*.py' ! -path '*/.*' || true)
          if [ -n "$BAD" ]; then
            echo "❌ Agent filenames must be snake_case (no dashes):"
            echo "$BAD"
            exit 1
          fi

      - name: Security scan agents
        run: |
          python -c "
          import re, sys
          from pathlib import Path
          PATTERNS = [
              (r'\beval\s*\(', 'eval()'),
              (r'\bexec\s*\(', 'exec()'),
              (r'\b__import__\s*\(', '__import__()'),
              (r'\bos\.system\s*\(', 'os.system()'),
              (r'\bsubprocess\.\w+\s*\(', 'subprocess'),
              (r'(api[_-]?key|secret|password|token)\s*=\s*[\"'\'']{1}[^\"'\'']{8,}', 'hardcoded secret'),
          ]
          fails = []
          for f in Path('agents').rglob('*.py'):
              src = f.read_text()
              for pat, label in PATTERNS:
                  if re.search(pat, src):
                      fails.append(f'{f}: {label}')
          if fails:
              print('❌ Security scan failed:')
              for f in fails: print(f'  {f}')
              sys.exit(1)
          print('✓ Security scan passed')
          "

      - name: Build registry
        run: python build_registry.py

      - name: Commit registry.json
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "RAPP Registry Bot"
          git config user.email "rapp-bot@users.noreply.github.com"
          git add registry.json
          git diff --cached --quiet || git commit -m "Auto-build registry.json [skip ci]"
          git push
