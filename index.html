<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPP Agent Repository</title>
<meta name="description" content="Browse single-file AI agents. Every agent is one Python file.">
<meta property="og:title" content="RAPP Agent Repository">
<meta property="og:description" content="Browse single-file AI agents. Every agent is one Python file.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://kody-w.github.io/RAR/">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "RAPP Agent Repository",
  "url": "https://kody-w.github.io/RAR/",
  "description": "Browse single-file AI agents. Every agent is one Python file.",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Any",
  "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"},
  "author": {"@type": "Organization", "name": "Wildhaven of America", "url": "https://github.com/kody-w/RAR"}
}
</script>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --border-hover: #484f58;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --text-muted: #656d76;
  --accent: #58a6ff;
  --green: #3fb950;
  --radius: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 32px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 1.15rem; font-weight: 700; cursor: default;
}
.logo-mark {
  background: linear-gradient(135deg, var(--accent), #bc8cff);
  color: #fff; width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem; font-weight: 800;
}
.header-right { display: flex; align-items: center; gap: 12px; }
.adv-link {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  padding: 6px 14px; border-radius: 6px; font-size: .78rem; font-weight: 600;
  cursor: pointer; transition: all .15s; text-decoration: none;
}
.adv-link:hover { border-color: var(--border-hover); color: var(--text); text-decoration: none; }

.container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

.search-box { position: relative; margin-bottom: 20px; }
.search-box input {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 16px 12px 40px; color: var(--text); font-size: 1rem; outline: none;
  transition: border-color .15s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text-muted); }
.search-box .si {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); pointer-events: none;
}

.pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.pill {
  background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
  padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: .82rem;
  transition: all .15s; white-space: nowrap;
}
.pill:hover { border-color: var(--border-hover); color: var(--text); }
.pill.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,.1); }
.pill .ct {
  background: var(--surface2); padding: 1px 6px; border-radius: 10px;
  font-size: .72rem; margin-left: 4px;
}
.pill.active .ct { background: rgba(88,166,255,.2); }

.agents-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px;
}
.agent-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; cursor: default; transition: border-color .2s;
}
.agent-card:hover { border-color: var(--accent); }
.card-name { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; }
.card-desc {
  color: var(--text-dim); font-size: .88rem; line-height: 1.5; margin-bottom: 12px;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  font-size: .78rem; color: var(--text-muted);
}
.cat-badge {
  background: var(--surface2); padding: 2px 8px; border-radius: 6px;
  font-size: .72rem; text-transform: capitalize;
}
.dl-btn {
  background: none; border: 1px solid var(--border); color: var(--text-dim);
  padding: 4px 10px; border-radius: 6px; font-size: .75rem; cursor: pointer;
  transition: all .15s;
}
.dl-btn:hover { border-color: var(--accent); color: var(--accent); }

.empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.loading { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Detail modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
  align-items: flex-start; justify-content: center; padding: 60px 20px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  max-width: 640px; width: 100%; padding: 28px; position: relative;
}
.modal-close {
  position: absolute; top: 12px; right: 16px; background: none; border: none;
  color: var(--text-muted); font-size: 1.2rem; cursor: pointer;
}
.modal-close:hover { color: var(--text); }
.modal h2 { font-size: 1.3rem; margin-bottom: 4px; }
.modal .meta { color: var(--text-muted); font-size: .82rem; margin-bottom: 16px; }
.modal .desc { color: var(--text-dim); font-size: .95rem; line-height: 1.6; margin-bottom: 20px; }
.modal .section { margin-bottom: 16px; }
.modal .section h3 { font-size: .88rem; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
.modal .install-block {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px; font-family: 'SF Mono', Consolas, monospace; font-size: .82rem;
  color: var(--text-dim); word-break: break-all;
}
.modal .install-block a { color: var(--accent); }
.modal .get-btn {
  display: inline-block; margin-top: 12px; padding: 10px 24px; border-radius: 8px;
  background: var(--accent); color: #fff; font-weight: 600; font-size: .9rem;
  border: none; cursor: pointer; transition: opacity .15s;
}
.modal .get-btn:hover { opacity: .85; text-decoration: none; }
.modal .env-list { display: flex; flex-wrap: wrap; gap: 6px; }
.modal .env-tag {
  background: rgba(210,153,34,.1); color: #d29922; padding: 3px 10px;
  border-radius: 6px; font-family: monospace; font-size: .82rem;
}

.stats-bar {
  display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
}
.stat { font-size: .9rem; color: var(--text-dim); }
.stat strong { color: var(--accent); font-weight: 700; }

@media (max-width: 640px) {
  header { padding: 12px 16px; }
  .container { padding: 20px 16px; }
  .agents-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">R</div>
    <span>RAPP Agent Repository</span>
  </div>
  <div class="header-right">
    <a class="adv-link" href="store.html">Advanced</a>
  </div>
</header>

<div class="container">
  <div class="search-box">
    <span class="si"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 20 20"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="2" opacity="0.6"/><line x1="12" y1="12" x2="17" y2="17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg></span>
    <input type="text" id="search" placeholder="Search agents..." oninput="render()">
  </div>
  <div id="stats-bar" class="stats-bar" style="display:none"></div>
  <div class="pills" id="pills"></div>
  <div id="grid">
    <div class="loading"><div class="spinner"></div>Loading agents...</div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
let OWNER = 'kody-w', REPO_NAME = 'RAR';
let RAW = `https://raw.githubusercontent.com/${OWNER}/${REPO_NAME}/main`;
let allAgents = [];
let currentCat = 'all';

async function loadConfig() {
  try {
    const r = await fetch('rar.config.json?t=' + Date.now());
    if (r.ok) {
      const cfg = await r.json();
      if (cfg.owner) OWNER = cfg.owner;
      if (cfg.repo) REPO_NAME = cfg.repo;
      RAW = `https://raw.githubusercontent.com/${OWNER}/${REPO_NAME}/main`;
    }
  } catch {}
}

async function init() {
  await loadConfig();
  try {
    const res = await fetch(RAW + '/registry.json?t=' + Date.now());
    if (!res.ok) throw new Error(res.status);
    const reg = await res.json();
    allAgents = reg.agents || [];

    const publishers = new Set(allAgents.map(a => a.name.split('/')[0])).size;
    document.getElementById('stats-bar').style.display = 'flex';
    document.getElementById('stats-bar').innerHTML =
      `<div class="stat"><strong>${allAgents.length}</strong> Agents</div>` +
      `<div class="stat"><strong>${publishers}</strong> Publishers</div>`;

    buildPills();
    render();
  } catch (e) {
    document.getElementById('grid').innerHTML =
      '<div class="empty">Failed to load registry. <a href="store.html">Try the full store</a>.</div>';
  }
}

function buildPills() {
  const counts = {};
  allAgents.forEach(a => { counts[a.category] = (counts[a.category] || 0) + 1; });
  const cats = Object.keys(counts).sort();
  let h = `<span class="pill active" onclick="setCat('all',this)">All <span class="ct">${allAgents.length}</span></span>`;
  cats.forEach(c => {
    h += `<span class="pill" onclick="setCat('${c}',this)">${c.replace(/_/g, ' ')} <span class="ct">${counts[c]}</span></span>`;
  });
  document.getElementById('pills').innerHTML = h;
}

function setCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  render();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let filtered = allAgents.filter(a => {
    if (currentCat !== 'all' && a.category !== currentCat) return false;
    if (!q) return true;
    const hay = [a.display_name, a.description, a.category?.replace(/_/g, ' '), ...(a.tags || []), a.author || ''].join(' ').toLowerCase();
    return q.split(/\s+/).some(w => w.length > 1 && hay.includes(w));
  });

  if (q) {
    const words = q.split(/\s+/).filter(w => w.length > 1);
    filtered.forEach(a => {
      let s = 0;
      const name = (a.display_name || '').toLowerCase();
      const desc = (a.description || '').toLowerCase();
      for (const w of words) {
        if (name.includes(w)) s += 10;
        if (desc.includes(w)) s += 5;
      }
      a._score = s;
    });
    filtered.sort((a, b) => b._score - a._score);
  } else {
    filtered.sort((a, b) => a.display_name.localeCompare(b.display_name));
  }

  if (!filtered.length) {
    document.getElementById('grid').innerHTML = '<div class="empty">No agents found.</div>';
    return;
  }

  document.getElementById('grid').innerHTML = `<div class="agents-grid">${filtered.map(card).join('')}</div>`;
}

function card(a) {
  return `
    <div class="agent-card" onclick="openAgent('${esc(a.name)}')">
      <div class="card-name">${esc(a.display_name)}</div>
      <div class="card-desc">${esc(a.description)}</div>
      <div class="card-footer">
        <span class="cat-badge">${(a.category || '').replace(/_/g, ' ')}</span>
        <span>by ${esc(a.author)}</span>
      </div>
    </div>`;
}

function openAgent(name) {
  const a = allAgents.find(x => x.name === name);
  if (!a) return;
  const rawUrl = a._file ? RAW + '/' + a._file : null;
  const ghUrl = a._file ? `https://github.com/${OWNER}/${REPO_NAME}/blob/main/${a._file}` : null;
  const envHtml = (a.requires_env || []).length
    ? a.requires_env.map(e => `<span class="env-tag">${esc(e)}</span>`).join('')
    : '<span style="color:var(--green)">None required</span>';

  document.getElementById('modal-content').innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2>${esc(a.display_name)}</h2>
    <div class="meta">${esc(a.category.replace(/_/g, ' '))} &middot; v${esc(a.version)} &middot; by ${esc(a.author)}</div>
    <div class="desc">${esc(a.description)}</div>
    ${rawUrl ? `<div class="section">
      <h3>Get this agent</h3>
      <div class="install-block">
        <div style="margin-bottom:8px;color:var(--text-muted)">Download the single .py file and drop it into your agents folder:</div>
        <a href="${esc(rawUrl)}" target="_blank">${esc(a._file)}</a>
      </div>
      <button class="get-btn" onclick="download('${esc(a.name)}')">Download agent.py</button>
    </div>` : ''}
    <div class="section">
      <h3>Environment Variables</h3>
      <div class="env-list">${envHtml}</div>
    </div>
    ${ghUrl ? `<div class="section"><a href="${esc(ghUrl)}" target="_blank" style="font-size:.85rem">View source on GitHub</a></div>` : ''}
  `;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

async function download(name) {
  const a = allAgents.find(x => x.name === name);
  if (!a?._file) return;
  try {
    const res = await fetch(RAW + '/' + a._file + '?t=' + Date.now());
    if (!res.ok) throw new Error(res.status);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = a._file.split('/').pop();
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
  } catch {
    alert('Download failed. Try the direct link.');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

init();
</script>
</body>
</html>
