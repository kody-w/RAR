<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPP Grail</title>
<meta name="description" content="A shareable permalink for any agent in the RAPP registry — card art, provenance, source, install command. Static, content-addressable.">
<meta property="og:title" content="RAPP Grail">
<meta property="og:description" content="Card art + agent.py source + cryptographic provenance, on a shareable static URL.">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --surface3: #2d333b;
  --border: #30363d;
  --border-hover: #484f58;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --text-muted: #656d76;
  --accent: #58a6ff;
  --accent2: #bc8cff;
  --green: #3fb950;
  --red: #f85149;
  --amber: #d29922;
  --mana-w: #f9e8c2;
  --mana-u: #aae0fa;
  --mana-b: #cbc2bf;
  --mana-r: #f9aa8f;
  --mana-g: #9bd3ae;
  --mana-c: #ccc2c0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }

header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 32px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 1.15rem; font-weight: 700; text-decoration: none; color: var(--text);
}
.logo:hover { text-decoration: none; }
.logo-mark {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem; font-weight: 800;
}
.header-right { display: flex; align-items: center; gap: 12px; }
.back-link {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  padding: 6px 14px; border-radius: 8px; font-size: .85rem; text-decoration: none;
}
.back-link:hover { border-color: var(--border-hover); color: var(--text); text-decoration: none; }

.container { max-width: 1180px; margin: 0 auto; padding: 32px 24px; }

/* Top split: card on left, metadata on right */
.top {
  display: grid; grid-template-columns: 380px 1fr;
  gap: 32px; align-items: start;
}
@media (max-width: 900px) {
  .top { grid-template-columns: 1fr; }
}

/* ── Card frame (MTG-ish) ───────────────────────────────────────── */
.card-wrap { perspective: 1200px; }
.card {
  width: 100%; max-width: 380px; aspect-ratio: 5 / 7;
  border-radius: 16px; padding: 14px;
  background:
    radial-gradient(ellipse at 30% 0%, rgba(255,255,255,.06), transparent 60%),
    linear-gradient(160deg, #1a1a2e 0%, #0d0d18 60%, #050511 100%);
  border: 1px solid rgba(255,255,255,.1);
  box-shadow:
    0 24px 60px rgba(0,0,0,.6),
    0 4px 16px rgba(88,166,255,.1),
    inset 0 0 0 1px rgba(255,255,255,.04);
  display: flex; flex-direction: column; gap: 10px;
  font-family: 'Cinzel', Georgia, serif;
  position: relative; overflow: hidden;
  transition: transform .35s ease;
}
.card:hover { transform: rotateY(2deg) rotateX(-1deg); }
.card-rarity-rare    { box-shadow: 0 24px 60px rgba(0,0,0,.6), 0 0 32px rgba(212,175,55,.18), inset 0 0 0 1px rgba(212,175,55,.18); }
.card-rarity-mythic  { box-shadow: 0 24px 60px rgba(0,0,0,.6), 0 0 36px rgba(255,107,53,.22), inset 0 0 0 1px rgba(255,107,53,.25); }
.card-rarity-legendary { box-shadow: 0 24px 60px rgba(0,0,0,.6), 0 0 40px rgba(188,140,255,.30), inset 0 0 0 1px rgba(188,140,255,.30); }

.card-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 6px;
  background: linear-gradient(90deg, rgba(0,0,0,.3), rgba(0,0,0,.15));
  border-radius: 8px;
}
.card-name {
  font-size: 1.1rem; font-weight: 700; letter-spacing: .3px;
  color: #f5f3ea; text-shadow: 0 1px 2px rgba(0,0,0,.7);
}
.mana-cost { display: flex; gap: 3px; }
.mana {
  width: 22px; height: 22px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 800; font-family: -apple-system, sans-serif;
  color: #1a1a1a;
  box-shadow: inset 0 -2px 3px rgba(0,0,0,.2), 0 1px 2px rgba(0,0,0,.4);
}
.mana-W { background: var(--mana-w); }
.mana-U { background: var(--mana-u); }
.mana-B { background: var(--mana-b); }
.mana-R { background: var(--mana-r); }
.mana-G { background: var(--mana-g); }
.mana-C { background: var(--mana-c); }

.card-art {
  flex: 0 0 auto; aspect-ratio: 4 / 3;
  background: #050811; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.08);
  overflow: hidden;
}
.card-art svg { width: 100%; height: 100%; display: block; }

.card-typeline {
  font-size: .82rem; padding: 4px 8px;
  background: linear-gradient(90deg, rgba(0,0,0,.3), rgba(0,0,0,.1));
  color: #f5f3ea; border-radius: 4px; font-style: italic;
}

.card-text {
  flex: 1 1 auto; padding: 10px 12px;
  background: rgba(245, 243, 234, .92); color: #1a1a1a;
  border-radius: 6px; font-family: 'Charter', Georgia, serif;
  font-size: .82rem; overflow: auto;
  display: flex; flex-direction: column; gap: 7px;
}
.ability { line-height: 1.35; }
.ability .kw { font-weight: 700; }
.ability .cost { color: #555; font-size: .9em; }
.flavor {
  margin-top: auto; padding-top: 8px;
  border-top: 1px dashed rgba(0,0,0,.2);
  font-style: italic; color: #555; font-size: .78rem;
}

.card-bottom {
  display: flex; justify-content: space-between; align-items: center;
  font-size: .72rem; color: #cdc8b8; padding: 0 4px;
}
.set-code { letter-spacing: .5px; opacity: .8; }
.pt-box {
  background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
  border: 1px solid rgba(255,255,255,.18); padding: 4px 12px;
  border-radius: 6px; font-weight: 700; font-size: .9rem; color: #f5f3ea;
  box-shadow: inset 0 -2px 4px rgba(0,0,0,.4);
}

/* ── Metadata column ────────────────────────────────────────────── */
.meta h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 4px; }
.meta .subtitle { color: var(--text-dim); margin-bottom: 24px; font-size: .95rem; }
.meta .pub-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1px solid var(--border);
  padding: 4px 12px; border-radius: 16px; font-size: .82rem;
  color: var(--accent); font-weight: 600; margin-right: 8px; text-decoration: none;
}
.meta .pub-pill:hover { border-color: var(--accent); text-decoration: none; }
.meta .ver-pill {
  display: inline-block; background: var(--surface);
  border: 1px solid var(--border); padding: 4px 10px; border-radius: 16px;
  font-size: .8rem; color: var(--text-dim); font-family: ui-monospace, monospace;
}

.section { margin-top: 28px; }
.section h2 { font-size: .95rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }

.install {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.install code { font-size: .85rem; color: var(--accent); user-select: all; word-break: break-all; }
.copy-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  padding: 6px 12px; border-radius: 6px; font-size: .75rem; cursor: pointer;
  font-weight: 600; white-space: nowrap;
}
.copy-btn:hover { border-color: var(--border-hover); color: var(--text); }
.copy-btn.copied { color: var(--green); border-color: rgba(63,185,80,.4); }

.provenance {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 16px; font-size: .85rem;
}
.provenance .row { display: flex; gap: 12px; margin-bottom: 8px; }
.provenance .row:last-child { margin-bottom: 0; }
.provenance .label { color: var(--text-muted); min-width: 140px; flex-shrink: 0; }
.provenance .value { color: var(--text); font-family: ui-monospace, monospace; word-break: break-all; }
.provenance .value a { color: var(--accent); }
.provenance .hash { color: var(--text-dim); }

.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  background: var(--surface2); border: 1px solid var(--border);
  padding: 3px 9px; border-radius: 12px; font-size: .72rem; color: var(--text-dim);
}

.share-row { display: flex; gap: 8px; margin-top: 24px; flex-wrap: wrap; }
.share-btn {
  background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
  padding: 8px 14px; border-radius: 8px; font-size: .82rem; text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.share-btn:hover { border-color: var(--border-hover); color: var(--text); text-decoration: none; }

/* ── Source code section ────────────────────────────────────────── */
.source-section { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 24px; }
.source-head {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
}
.source-head h2 { color: var(--text); text-transform: none; letter-spacing: 0; font-size: 1.1rem; font-weight: 700; }
.source-head .source-meta { color: var(--text-muted); font-size: .82rem; }
.source-pre {
  background: #0a0d12; border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; overflow: auto; max-height: 650px;
  font-size: .82rem; line-height: 1.5;
}
.source-pre code { color: #c9d1d9; }
/* tiny inline python highlighter */
.tok-kw { color: #ff7b72; }
.tok-str { color: #a5d6ff; }
.tok-num { color: #79c0ff; }
.tok-com { color: #8b949e; font-style: italic; }
.tok-fn  { color: #d2a8ff; }
.tok-cls { color: #ffa657; }

.loading, .error {
  text-align: center; padding: 80px 20px; color: var(--text-dim);
}
.error { color: var(--red); }
.error-detail { color: var(--text-muted); margin-top: 12px; font-size: .85rem; }

@media (max-width: 640px) {
  header { padding: 12px 16px; }
  .container { padding: 20px 16px; }
}
</style>
</head>
<body>

<header>
  <a class="logo" href="binder.html">
    <div class="logo-mark">R</div>
    <span>RAPP Grail</span>
  </a>
  <div class="header-right">
    <a class="back-link" href="binder.html">All cards</a>
  </div>
</header>

<div class="container" id="root">
  <div class="loading" id="initial-loading">Loading card…</div>
</div>

<script>
const REGISTRY_URL = 'registry.json';
const CARDS_URL = 'cards/holo_cards.json';
const RAW_BASE = 'https://raw.githubusercontent.com/kody-w/RAR';

function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }
function shortSha(s) { return s ? String(s).slice(0, 8) : '—'; }

function parseManaCost(cost) {
  if (!cost) return [];
  // {1}{G}{W}{R}  →  ['1', 'G', 'W', 'R']
  const out = [];
  const re = /\{([^}]+)\}/g;
  let m;
  while ((m = re.exec(cost))) out.push(m[1]);
  return out;
}

function manaPip(sym) {
  const code = sym.toUpperCase();
  if (['W','U','B','R','G','C'].includes(code)) {
    return `<span class="mana mana-${code}" title="${code}">${code}</span>`;
  }
  // Numeric / generic
  return `<span class="mana mana-C" title="${esc(sym)}">${esc(sym)}</span>`;
}

// Tiny syntax highlighter for python — good enough for display, no deps.
const PY_KW = ['False','None','True','and','as','assert','async','await','break','class','continue','def','del','elif','else','except','finally','for','from','global','if','import','in','is','lambda','nonlocal','not','or','pass','raise','return','try','while','with','yield'];
function highlightPython(src) {
  // Mask strings & comments first to protect them from keyword regex
  const tokens = [];
  let masked = src
    .replace(/("""[\s\S]*?"""|'''[\s\S]*?'''|"(?:[^"\\\n]|\\.)*"|'(?:[^'\\\n]|\\.)*')/g, (m) => { tokens.push(['str', m]); return `\x00${tokens.length-1}\x00`; })
    .replace(/(#[^\n]*)/g, (m) => { tokens.push(['com', m]); return `\x00${tokens.length-1}\x00`; });
  masked = esc(masked);
  // Keywords
  const kwRe = new RegExp('\\b(' + PY_KW.join('|') + ')\\b', 'g');
  masked = masked.replace(kwRe, '<span class="tok-kw">$1</span>');
  // Numbers
  masked = masked.replace(/\b(\d+\.?\d*|0x[0-9a-fA-F]+)\b/g, '<span class="tok-num">$1</span>');
  // class definitions
  masked = masked.replace(/(<span class="tok-kw">class<\/span>)\s+([A-Z]\w*)/g, '$1 <span class="tok-cls">$2</span>');
  // function definitions
  masked = masked.replace(/(<span class="tok-kw">def<\/span>)\s+(\w+)/g, '$1 <span class="tok-fn">$2</span>');
  // Restore strings/comments
  masked = masked.replace(/\x00(\d+)\x00/g, (_, i) => {
    const [kind, raw] = tokens[+i];
    return `<span class="tok-${kind}">${esc(raw)}</span>`;
  });
  return masked;
}

async function load() {
  const root = document.getElementById('root');
  let key = decodeURIComponent(location.hash.slice(1)).trim();
  if (!key) {
    root.innerHTML = `
      <div class="error">
        <h2>No agent specified</h2>
        <div class="error-detail">Append <code>#@publisher/agent_name</code> to the URL.<br>
        Example: <code>grail.html#@howardh/chief_of_staff_agent</code></div>
      </div>`;
    return;
  }

  let registry, cards, agent, card;
  try {
    [registry, cards] = await Promise.all([
      fetch(REGISTRY_URL + '?t=' + Date.now()).then(r => r.json()),
      fetch(CARDS_URL + '?t=' + Date.now()).then(r => r.json()),
    ]);
  } catch (e) {
    root.innerHTML = `<div class="error"><h2>Failed to load registry</h2><div class="error-detail">${esc(e.message)}</div></div>`;
    return;
  }

  // Try exact match, then dash/underscore variants
  const variants = [key, key.replace(/_/g, '-'), key.replace(/-/g, '_')];
  for (const v of variants) {
    if (!agent) agent = (registry.agents || []).find(a => a.name === v) || (registry.swarms || []).find(a => a.name === v);
    if (!card) card = cards[v];
  }

  if (!agent) {
    root.innerHTML = `
      <div class="error">
        <h2>Agent not found in registry</h2>
        <div class="error-detail">No entry for <code>${esc(key)}</code>.<br>
        <a href="binder.html">Browse all cards</a></div>
      </div>`;
    return;
  }
  if (!card) card = {};

  const rarity = card.rarity || 'common';
  const cls = ['card', `card-rarity-${rarity}`].join(' ');
  const manaPips = parseManaCost(card.mana_cost).map(manaPip).join('');
  const abilities = (card.abilities || []).map(a => `
    <div class="ability">
      ${a.keyword ? `<span class="kw">${esc(a.keyword)}</span>` : ''}
      ${a.cost ? `<span class="cost">${esc(a.cost)}</span>` : ''}
      ${a.text ? ` — ${esc(a.text)}` : ''}
    </div>`).join('');
  const ptBox = (card.power !== undefined && card.toughness !== undefined)
    ? `<div class="pt-box">${esc(card.power)}/${esc(card.toughness)}</div>` : '';

  const setCode = card.set_code || 'RAPP·' + (rarity.slice(0,3).toUpperCase());
  const filePath = agent._file || '';
  const firstSha = agent._first_commit_sha || '';
  const latestSha = agent._latest_commit_sha || '';
  const py_url_main = `${RAW_BASE}/main/${filePath}`;
  const py_url_pinned = latestSha ? `${RAW_BASE}/${latestSha}/${filePath}` : py_url_main;

  // Avatar SVG comes pre-rendered from the forge — inject it directly
  const avatar = card.avatar_svg
    ? card.avatar_svg
    : `<svg viewBox="0 0 200 200"><rect width="200" height="200" fill="#0d1117"/><text x="100" y="105" text-anchor="middle" fill="#58a6ff" font-size="14" font-family="monospace">${esc(agent.display_name || agent.name.split('/').pop())}</text></svg>`;

  const publisher = (agent.name || '').split('/')[0];
  const slug = (agent.name || '').split('/').slice(1).join('/');

  root.innerHTML = `
    <div class="top">
      <div class="card-wrap">
        <div class="${cls}">
          <div class="card-top">
            <div class="card-name">${esc(card.name || agent.display_name || slug)}</div>
            <div class="mana-cost">${manaPips}</div>
          </div>
          <div class="card-art">${avatar}</div>
          <div class="card-typeline">${esc(card.type_line || agent.category || 'Agent')}</div>
          <div class="card-text">
            ${abilities || `<div class="ability">${esc(agent.description || '')}</div>`}
            ${card.flavor_text ? `<div class="flavor">${esc(card.flavor_text)}</div>` : ''}
          </div>
          <div class="card-bottom">
            <div class="set-code">${esc(setCode)}</div>
            ${ptBox}
          </div>
        </div>
      </div>

      <div class="meta">
        <h1>${esc(agent.display_name || slug)}</h1>
        <p class="subtitle">${esc(agent.description || '')}</p>
        <div>
          <a class="pub-pill" href="binder.html?publisher=${encodeURIComponent(publisher)}">${esc(publisher)}</a>
          <span class="ver-pill">v${esc(agent.version || '0.0.0')}</span>
          ${agent.quality_tier ? `<span class="ver-pill" style="margin-left:6px">${esc(agent.quality_tier)}</span>` : ''}
        </div>

        <div class="section">
          <h2>Install</h2>
          <div class="install">
            <code id="install-cmd">@rapp/binder install_agent ${esc(agent.name)}</code>
            <button class="copy-btn" data-copy="install-cmd">copy</button>
          </div>
        </div>

        <div class="section">
          <h2>Provenance</h2>
          <div class="provenance">
            <div class="row">
              <div class="label">Source file</div>
              <div class="value"><a href="${py_url_main}" target="_blank">${esc(filePath || 'unknown')}</a></div>
            </div>
            <div class="row">
              <div class="label">First commit</div>
              <div class="value">
                ${firstSha ? `<a href="https://github.com/kody-w/RAR/commit/${firstSha}" target="_blank">${shortSha(firstSha)}</a>` : '<span class="hash">—</span>'}
                ${agent._added_at ? `<span class="hash"> · ${esc(agent._added_at)}</span>` : ''}
              </div>
            </div>
            <div class="row">
              <div class="label">Latest commit</div>
              <div class="value">
                ${latestSha ? `<a href="https://github.com/kody-w/RAR/commit/${latestSha}" target="_blank">${shortSha(latestSha)}</a>` : '<span class="hash">—</span>'}
              </div>
            </div>
            <div class="row">
              <div class="label">Source sha256</div>
              <div class="value hash">${esc(agent._sha256 || '—')}</div>
            </div>
            ${agent._card_sha256 ? `
            <div class="row">
              <div class="label">Card sha256</div>
              <div class="value hash">${esc(agent._card_sha256)}</div>
            </div>` : ''}
            <div class="row">
              <div class="label">Pinned raw URL</div>
              <div class="value"><a href="${py_url_pinned}" target="_blank">raw @ ${shortSha(latestSha)}</a></div>
            </div>
          </div>
        </div>

        ${(agent.tags || []).length ? `
        <div class="section">
          <h2>Tags</h2>
          <div class="tags">${(agent.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>
        </div>` : ''}

        <div class="share-row">
          <a class="share-btn" href="javascript:void(0)" id="share-link">📋 Copy permalink</a>
          <a class="share-btn" href="${py_url_main}" target="_blank">📄 Raw .py</a>
          <a class="share-btn" href="https://github.com/kody-w/RAR/blob/main/${filePath}" target="_blank">🔗 GitHub</a>
        </div>
      </div>
    </div>

    <div class="source-section">
      <div class="source-head">
        <h2>${esc(filePath || 'agent.py')}</h2>
        <div class="source-meta" id="src-meta">loading…</div>
      </div>
      <pre class="source-pre"><code id="src-code">loading…</code></pre>
    </div>
  `;

  // Wire up copy buttons + share link
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.onclick = () => {
      const target = document.getElementById(btn.dataset.copy);
      navigator.clipboard.writeText(target.textContent).then(() => {
        btn.textContent = '✓ copied';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
      });
    };
  });
  document.getElementById('share-link').onclick = () => {
    navigator.clipboard.writeText(location.href).then(() => {
      const el = document.getElementById('share-link');
      const orig = el.textContent;
      el.textContent = '✓ copied';
      setTimeout(() => { el.textContent = orig; }, 1500);
    });
  };

  // Update document title + meta
  document.title = `${agent.display_name || slug} — RAPP Grail`;
  const ogTitle = document.querySelector('meta[property="og:title"]');
  if (ogTitle) ogTitle.setAttribute('content', `${agent.display_name || slug} — RAPP Grail`);

  // Fetch the source code (pinned to commit if we have one, else main)
  try {
    const src = await fetch(py_url_pinned).then(r => r.ok ? r.text() : Promise.reject(new Error('HTTP ' + r.status)));
    document.getElementById('src-code').innerHTML = highlightPython(src);
    const lines = src.split('\n').length;
    const bytes = new Blob([src]).size;
    document.getElementById('src-meta').textContent =
      `${lines} lines · ${bytes.toLocaleString()} bytes${latestSha ? ' · pinned to ' + shortSha(latestSha) : ''}`;
  } catch (e) {
    document.getElementById('src-code').textContent = `# Failed to load source: ${e.message}\n# Try the raw URL: ${py_url_main}`;
    document.getElementById('src-meta').textContent = 'load error';
  }
}

window.addEventListener('hashchange', () => location.reload());
load();
</script>
</body>
</html>
