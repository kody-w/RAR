name: Process Community Issues

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to reprocess'
        required: false

permissions:
  contents: write
  issues: write

concurrency:
  group: state-writer
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    # Only process issues with the RAR action prefix in title
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.issue.title, '[RAR]') ||
      startsWith(github.event.issue.title, '[AGENT]')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch issue for manual dispatch
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number != ''
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.inputs.issue_number }} > /tmp/manual_issue.json
          # Wrap in the event format process_issues expects
          python3 -c "
          import json
          issue = json.load(open('/tmp/manual_issue.json'))
          event = {'issue': issue}
          json.dump(event, open('/tmp/dispatch_event.json', 'w'))
          "
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Process issue
        id: process
        env:
          GITHUB_EVENT_PATH: ${{ github.event_name == 'workflow_dispatch' && '/tmp/dispatch_event.json' || github.event_path }}
        run: |
          python scripts/process_issues.py --event-path "$GITHUB_EVENT_PATH" 2>&1 | tee /tmp/result.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Rebuild registry (votes/reviews only — agents stay in staging)
        if: steps.process.outputs.exit_code == '0'
        run: python build_registry.py

      - name: Commit state changes
        if: always()
        env:
          ISSUE_NUM: ${{ github.event.issue.number || github.event.inputs.issue_number || '0' }}
        run: |
          git config user.name "RAPP Registry Bot"
          git config user.email "rapp-bot@users.noreply.github.com"
          git add state/ registry.json staging/ || true
          if ! git diff --cached --quiet; then
            git commit -m "Process issue #${ISSUE_NUM} [skip ci]"
            for i in 1 2 3 4 5; do
              git push && break
              echo "Push attempt $i failed, rebasing..."
              git pull --rebase origin main || git rebase --abort
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                git rebase --abort
                git pull origin main --no-rebase
                git add state/ registry.json staging/ || true
                git diff --cached --quiet || git commit -m "Process issue #${ISSUE_NUM} (retry) [skip ci]"
              fi
            done
          fi

      - name: Label submission for review (pending)
        if: steps.process.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue?.number || ${{ github.event.inputs.issue_number || 0 }};
            if (!issueNumber) return;
            const fs = require('fs');
            let result = '';
            try { result = fs.readFileSync('/tmp/result.txt', 'utf8'); } catch(e) {}
            const isSubmission = result.includes('pending_review');
            if (isSubmission) {
              // Submission → label for review, do NOT close
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '📋 Agent staged for review. An admin will review and approve before it enters the registry.\n\nThe card will be forged upon approval — card details are determined by the forge, not the submitter.'
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['pending-review', 'agent-submission']
              });
            } else {
              // Vote/review → close as processed
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '✅ Processed successfully! State updated.'
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed',
                labels: ['processed']
              });
            }

      - name: Comment on issue (failure)
        if: steps.process.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue?.number || ${{ github.event.inputs.issue_number || 0 }};
            if (issueNumber) {
              const fs = require('fs');
              let detail = '';
              try { detail = fs.readFileSync('/tmp/result.txt', 'utf8'); } catch(e) {}
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `❌ Processing failed.\n\n\`\`\`\n${detail.slice(0, 500)}\n\`\`\``
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed',
                labels: ['failed']
              });
            }
